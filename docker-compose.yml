version: "3.8"

services:
  frontend:
    image: tazmans/smartcar-frontend:latest
    container_name: smartcar-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      API_URL: ${API_URL}

  backend:
    image: tazmans/smartcar-backend:latest
    container_name: smartcar-backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${FRONTEND_URL}
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
