version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: smartcar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: smartcar-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartcar-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:
