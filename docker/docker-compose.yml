version: "3.8"

x-backend: &backend-template
  image: tazmans/smartcar-backend:latest
  restart: unless-stopped
  env_file:
    - .env
  healthcheck:
    test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1" ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  depends_on:
    - postgres
    - mosquitto

services:
  nginx:
    build:
      context: ./nginx
    container_name: smartcar-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  frontend:
    image: tazmans/smartcar-frontend:latest
    container_name: smartcar-frontend
    restart: unless-stopped
    environment:
      API_URL: ${API_URL}

  backend:
    <<: *backend-template
    container_name: smartcar-backend

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300

  postgres:
    image: postgres:17
    container_name: smartcar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartcar-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:
