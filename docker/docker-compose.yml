version: "3.8"

x-backend: &backend-template
  image: tazmans/smartcar-backend:latest
  restart: unless-stopped
  environment:
    FRONTEND_URL: ${FRONTEND_URL}
  healthcheck:
    test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1" ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  nginx:
    build:
      context: ./nginx
    container_name: smartcar-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  frontend:
    image: tazmans/smartcar-frontend:latest
    container_name: smartcar-frontend
    restart: unless-stopped
    environment:
      API_URL: ${API_URL}

  backend:
    <<: *backend-template
    container_name: smartcar-backend

  backend2:
    <<: *backend-template
    container_name: smartcar-backend2

  backend3:
    <<: *backend-template
    container_name: smartcar-backend3

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
