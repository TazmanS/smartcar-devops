apiVersion: apps/v1
kind: Deployment

metadata:
  name: smartcar-mosquitto

spec:
  replicas: 1

  selector:
    matchLabels:
      app: smartcar-mosquitto

  template:
    metadata:
      labels:
        app: smartcar-mosquitto

    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 1883

          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf

      volumes:
        - name: mosquitto-config
          configMap:
            name: smartcar-mosquitto-config
